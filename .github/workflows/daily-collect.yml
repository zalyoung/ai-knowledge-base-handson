name: Daily Collect

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r week2-v2/requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python week2-v2/pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        run: python week2-v2/hooks/validate_json.py week2-v2/knowledge/articles/*.json

      - name: Check quality
        run: python week2-v2/hooks/check_quality.py week2-v2/knowledge/articles/*.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add week2-v2/knowledge/

          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            COUNT=$(git diff --cached --numstat | grep -c ".json$")
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: collect ${COUNT} articles (${DATE})"
            git push
          fi
